baseurl = "https://example.com"
languageCode = "en-us"
title = ""
theme = "hugo-tania"
paginate = 6

disqusShortname = "https-hugo-tania-netlify-app"

[params]
# Emoji will show before the blog title on site navbar.
titleEmoji = "🤖"

# Logo will show before the blog title on site navbar.
titleLogo = ""

# Enable float footnotes.
# Default to true
enableFootnotes = true

siteName = ""
siteDesc = ""
author = "Sandesh Bhusal"

[params.colorScheme]
# Enable toggle colorScheme
# Default to true
toggle = true
# Default colorScheme
# Default to auto
default = "light"

# Limit how many categories filter show above search input.
# Default to 5
maxCategoryToShow = 10

# Show your social information with icon on index bio with `_index.md` content.
[params.socialOptions]
dev-to = ""
email = ""
facebook = ""
github = ""
instagram = ""
linkedin = ""
medium = ""
stack-overflow = ""
steam = ""
telegram = ""
twitter = ""
twitch = ""
whatsapp = ""

[params.comments]
enabled = true
provider = "utterances"
[utterances]
repo = "sandeshbhusal.github.io"
issueTerm = "blog"
label = "comment"

[menu]
[[menu.header]]
name = "Archive"
url = "/articles/"

[[menu.header]]
name = "Series"
url = "/series/"
[[menu.footer]]
name = "RSS"
url = "/index.xml"

[markup]
[markup.highlight]
noClasses = false
lineNos = true
[markup.goldmark.renderer]
unsafe = true

[outputs]
home = ["HTML", "RSS", "JSON"]
