---
layout: default
---
<title> {{ page.title }} | {{ site.title }} </title>

<div class = "black">
    <br />
    <center>
        <h2> {{ page.title }}</h2>
        <br />

        <small>
            Posted on {{ page.date | date_to_string }} <br />
            Authored by <b> {{ page.author }} </b>
        </small>
    </center>
    <br /><br />
    {{ content }}
</div>
<style>
    .black{
        color: black;
    }
</style>
