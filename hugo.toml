baseURL = "/"
languageCode = "en-us"
theme = ["hugo-notice", "poison"]
paginate = 10
pluralizelisttitles = false   # removes the automatically appended "s" on sidebar entries

# NOTE: If using Disqus as commenting engine, uncomment and configure this line
# disqusShortname = "yourDisqusShortname"

[params]
    brand = "Sandesh Bhusal"                      # name of your site - appears in the sidebar
    remote_brand_image = 'https://www.spongebobshop.com/cdn/shop/products/Viacom_Spongebob_Tote_Printful_SBSP-PTBF-PT_Image03_800x.jpg?v=1583786194' # path to a remote file
    # brand_image = "/images/krabs.webp"    # path to the image shown in the sidebar
    description = "Stuck in a local minima" # Used as default meta description if not specified in front matter
    dark_mode = true                      # optional - defaults to false
    # favicon = "favicon.png"             # path to favicon (defaults to favicon.png)

    front_page_content = ["posts"] # Equivalent to the default value, add page bundle names to include them on the front page.

    # MENU PLACEHOLDER
    # Menu dict keys:
        # Name:         The name to display on the menu.
        # URL:          The directory relative to the content directory.
        # HasChildren:  If the directory's files should be listed.  Default is true.
        # Limit:        If the files should be listed, how many should be shown.
    menu = [
        {Name = "About", URL = "/about/", HasChildren = false},
        {Name = "Log", URL = "/weekly-log/", HasChildren = false},
        {Name = "Posts", URL = "/posts/", Pre = "", HasChildren = true, Limit = 4},
    ]

    # hideToc= true
    # Links to your socials.  Comment or delete any you don't need/use. 
    github_url = "https://github.com/sandeshbhusal"
    linkedin_url = "https://linkedin.com/in/sandeshbhusal/"
    bluesky_url = "https://bhusal.bsky.social/"

    # NOTE: If you don't want to use RSS, comment or delete the following lines
    # Adds an RSS icon to the end of the socials which links to {{ .Site.BaseURL }}/index.xml
    rss_icon = true
    # Which section the RSS icon links to, defaults to all content. See https://gohugo.io/templates/rss/#section-rss
    rss_section = "posts"

[taxonomies]
    series = 'series'
    tags = 'tags'
